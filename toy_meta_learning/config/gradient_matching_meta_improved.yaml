gradient_matching:
  # Checkpoint pool configuration
  pool_size: 256  # Fixed pool = batch size (all processed each iteration)
  num_to_refresh: 1  # Refresh 1 checkpoint per iteration (0.4% refresh rate)

  # Task diversity (for generating random tasks)
  num_dimensions: 2
  mean_separations: [1.5, 2.0, 2.5, 3.0]
  stds: [0.8, 1.0, 1.2]
  labeling_freqs: [0.2, 0.3, 0.4]
  priors: [0.5]
  num_samples_per_task: 1000

  # Model architecture
  model_hidden_dims: [32, 32]

  # Inner loop (checkpoint progression)
  inner_lr: 0.01
  inner_optimizer: 'sgd'
  inner_momentum: 0.9
  batch_size: 1000  # Use full dataset (no batching)
  inner_steps_per_meta_update: 1  # Take 1 inner step before each meta-update

  # Meta-learning (pool_size checkpoints processed each iteration)
  meta_lr: 0.0005  # Increased learning rate (5x baseline)
  meta_betas: [0.9, 0.999]  # Default AdamW betas
  meta_weight_decay: 0.00001
  meta_iterations: 2000  # Increased from 500
  meta_grad_accumulation_steps: 1  # No gradient accumulation (update every iteration)

  # Learning rate scheduler
  use_lr_scheduler: true
  scheduler_type: 'cosine_annealing'  # 'cosine_annealing' or 'reduce_on_plateau'
  lr_warmup_iterations: 100  # Linear warmup for first 100 iterations
  lr_min_factor: 0.1  # Minimum LR = meta_lr * lr_min_factor

  # Learned loss configuration
  loss_type: 'neural'
  loss_hidden_dim: 128  # Increased from 64 for more expressiveness
  loss_init_mode: 'xavier_uniform'
  loss_l1_lambda: 0.0  # L1 regularization DISABLED
  loss_l05_lambda: 0.0  # L0.5 regularization DISABLED
  loss_max_weight_norm: 10.0  # Clip weights to prevent gradient explosion

  # Hybrid meta-objective (curriculum learning)
  use_hybrid_objective: false  # DISABLED - pure gradient matching with improved W1/W2 architecture
  hybrid_alpha_start: 1.0  # Start with 100% gradient matching
  hybrid_alpha_end: 0.3    # End with 30% gradient matching, 70% Oracle BCE
  hybrid_curriculum_start_iter: 100  # Start transitioning at iteration 100
  hybrid_curriculum_end_iter: 500   # Complete transition by iteration 500

  # Early stopping
  use_early_stopping: true
  early_stopping_patience: 200  # Stop if no improvement for 200 validation checks
  early_stopping_min_delta: 0.001  # Minimum improvement to count as progress

  # Validation
  val_freq: 20  # Validate every N iterations
  num_val_tasks: 3

  # Validation training parameters (convergence-based)
  max_train_steps: 500  # Maximum training steps before stopping
  convergence_patience: 20  # Stop after N steps without improvement

  # Device
  device: 'auto'  # 'auto', 'cpu', 'cuda', 'mps'
  force_deterministic: true  # Force CPU for deterministic results (MPS has non-determinism)
