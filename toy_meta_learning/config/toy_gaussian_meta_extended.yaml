# Extended Toy Gaussian Meta-Learning Configuration
# Includes both oracle (PN) and naive (PU) trained checkpoints at various stages

# ============================================================================
# EXPERIMENT MODE
# ============================================================================
mode: 'pu'  # Meta-learning for PU problem

# ============================================================================
# TASK GENERATION (Gaussian Blobs)
# ============================================================================
num_dimensions: 2  # Feature dimensionality
num_samples_per_task: 1000  # Samples per split

# Task hyperparameter grid (increased diversity)
mean_separations: [1.5, 2.0, 2.5, 3.0]  # 4 difficulty levels
stds: [0.8, 1.2]  # 2 overlap levels
priors: [0.5]  # Balanced classes
labeling_freqs: [0.3]  # 30% positives labeled for PU
negative_labeling_freq: 0.3  # Not used in PU mode

# ============================================================================
# TRAINING METHODS FOR CHECKPOINT POOL
# ============================================================================
# 'oracle': Train with ground truth PN labels (best possible)
# 'naive': Train with PU labels (only labeled positives + unlabeled)
training_methods: ['oracle', 'naive']

# ============================================================================
# MODEL ARCHITECTURE
# ============================================================================
model_hidden_dims: [32, 32]
model_activation: 'relu'

# ============================================================================
# LEARNABLE LOSS (6-parameter asymmetric basis for PU)
# ============================================================================
# f_p(x) = a1_p + a2_p·x + a3_p·log(x)  for labeled positives
# f_u(x) = a1_u + a2_u·x + a3_u·log(x)  for unlabeled
loss_init_mode: 'random'
loss_init_scale: 0.01

# ============================================================================
# INNER LOOP (Task Training)
# ============================================================================
inner_optimizer: 'sgd'
inner_lr: 0.01
inner_momentum: 0.9
inner_steps: 3
inner_batch_size: 64

# ============================================================================
# OUTER LOOP (Meta-Learning)
# ============================================================================
meta_optimizer: 'adam'
meta_lr: 0.001
meta_momentum: 0.9
meta_batch_size: 16  # Larger batch since we have more checkpoints
meta_iterations: 500  # More iterations for better convergence

# ============================================================================
# CHECKPOINT POOL - EXTENDED
# ============================================================================
# Include checkpoints from early training to near-convergence
checkpoint_epochs: [1, 5, 10, 20, 50, 100, 200]  # 7 stages
checkpoint_seeds: [42, 123, 456, 789, 999]  # 5 seeds for diversity
checkpoint_train_lr: 0.001  # LR for training checkpoints

# Total checkpoints calculation:
# mean_separations × stds × priors × labeling_freqs × seeds × methods × epochs
# = 4 × 2 × 1 × 1 × 5 × 2 × 7 = 560 checkpoints
#
# Breakdown:
#   - 4 task difficulties (mean_sep)
#   - 2 overlap levels (std)
#   - 5 random initializations (seeds)
#   - 2 training methods (oracle vs naive)
#   - 7 training stages (1 to 200 epochs)
#
# This provides:
#   - Early stage checkpoints (1, 5, 10 epochs)
#   - Mid-training (20, 50 epochs)
#   - Near-convergence (100, 200 epochs)
#   - Both oracle (optimal) and naive (PU) training trajectories

# ============================================================================
# LOGGING & SAVING
# ============================================================================
log_freq: 20
save_freq: 100
save_dir: './toy_meta_output_extended'

# ============================================================================
# DEVICE
# ============================================================================
device: 'auto'
