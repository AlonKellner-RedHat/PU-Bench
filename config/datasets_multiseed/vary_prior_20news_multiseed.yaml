dataset_class: 20News
data_dir: ./datasets
random_seeds: [123, 456, 789, 2024]

c_values: [0.1]
scenarios: [case-control]
selection_strategies: ["random"]

val_ratio: 0.01
target_prevalence: [0.1, 0.3, 0.5, 0.7, 0.9]
with_replacement: true
also_print_dataset_stats: false

# SBERT encoding settings - use precomputed embeddings!
sbert_model_name: all-MiniLM-L6-v2
sbert_embeddings_path: ./scripts/embeddings/20news_sbert_embeddings.npz

label_scheme:
  true_positive_label: 1
  true_negative_label: 0
  pu_labeled_label: 1
  pu_unlabeled_label: -1
