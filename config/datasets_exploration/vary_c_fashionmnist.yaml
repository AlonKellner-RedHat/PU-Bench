dataset_class: FashionMNIST
data_dir: ./datasets
random_seeds: [42]

c_values: [0.01, 0.05, 0.1, 0.3, 0.5, 0.7, 0.9]
scenarios: [case-control]
selection_strategies: ["random"]

val_ratio: 0.01
target_prevalence: null
with_replacement: true
also_print_dataset_stats: false

label_scheme:
  positive_classes: [0, 2, 3, 4, 6]  # Tops/Outerwear
  negative_classes: [5, 7, 8, 9]     # Footwear/Bags
