dataset_class: MNIST
data_dir: ./datasets
random_seeds: [42]  # Single seed for speed

c_values: [0.01, 0.05, 0.1, 0.3, 0.5, 0.7, 0.9]  # Vary label frequency
scenarios: [case-control]
selection_strategies: ["random"]

val_ratio: 0.01
target_prevalence: null  # Use natural prior
with_replacement: true
also_print_dataset_stats: false

label_scheme:
  positive_classes: [0, 2, 4, 6, 8]
  negative_classes: [1, 3, 5, 7, 9]
