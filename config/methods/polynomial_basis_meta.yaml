polynomial_basis_meta:
  # === Loss Type Selection ===
  loss_type: "polynomial_basis"         # Use polynomial basis instead of monotonic basis

  # === Meta-Learning Setup ===
  meta_lr: 0.001                        # TUNED: Increased to 0.001 for faster learning
  meta_lr_warmup_iters: 100             # ADDED: Linear warmup from meta_lr/3 to meta_lr
  meta_optimizer: "adamw"               # Use AdamW optimizer (outer loop)
  meta_weight_decay: 0.01               # AdamW weight decay
  meta_lr_scheduler: "cosine"           # Cosine annealing scheduler
  meta_lr_min: 0.00001                  # Minimum LR for cosine annealing
  inner_lr: 0.01                        # TUNED: Increased for SGD (SGD needs higher LR than Adam)
  inner_optimizer: "sgd"                # TUNED: Changed to SGD for stability
  inner_momentum: 0.9                   # ADDED: SGD momentum
  meta_batch_size: 32                   # Standard batch size
  meta_iterations: 1800                 # Full epoch over checkpoint pool
  meta_objective: "bce"                 # BCE validation loss
  K_inner_steps: 1                      # TUNED: Simplified from 3 to 1 for stability
  gradient_accumulation_steps: 2        # TUNED: Reduced from 4 for fresher gradients
  gradient_clip_norm: 1.0               # Gradient clipping

  # === Meta-Objective ===
  oracle_loss_weight: 1.0               # Weight for oracle BCE loss (1.0 = equal weight with improvement)

  # === Regularization ===
  l1_weight: 0.001                      # TUNED: Increased 10× for stronger sparsity on inverses/log
  l2_weight: 0.001                      # L2 on polynomial coefficients (10× on exponential)

  # === Performance Optimizations ===
  precache_loaders: true                # Pre-cache loaders
  verbose: true                         # Enable detailed logging

  # === DataLoader Settings ===
  num_workers: 0                        # No multiprocessing
  prefetch_factor: 2
  persistent_workers: false
  pin_memory: false

  # === Adaptive Meta-Batch Sizes ===
  adaptive_batch_sizes:
    # Tabular datasets (small, fast) - TUNED: Increased for better gradient estimates
    mushrooms: 96
    spambase: 96
    connect4: 96
    # Image datasets (medium) - TUNED: Increased for better gradient estimates
    mnist: 32
    fashionmnist: 32
    # Text datasets (large embeddings) - TUNED: Increased moderately
    imdb: 16
    20news: 16
    # Large image datasets - TUNED: Increased carefully
    cifar10: 8
    alzheimermri: 8

  # === Vmap Parallelization ===
  use_vmap: false                       # Sequential processing
  vmap_chunk_sizes:
    LeNet: 8
    MLP_Tabular: 16
    MLP_Text: 4
    CNN_CIFAR10: 2
    CNN_Medical: 2
  architecture_cycle_order:
    - LeNet
    - MLP_Tabular
    - MLP_Text

  # === Checkpoint Pool ===
  checkpoint_pool_size: 1800
  checkpoint_epochs: [1, 5, 10, 15, 20, 25, 30, 35, 40, 45]
  checkpoint_seeds: [42, 123, 456, 789]
  enable_curriculum: false
  checkpoint_refresh_freq: 999999
  checkpoint_refresh_percent: 0
  checkpoint_dir: "./meta_checkpoints"

  # === Task Profiling ===
  profile_tasks: true
  profile_output: "./task_speeds.json"
  task_split_file: "./task_split.yaml"
  target_training_datasets: 5
  target_test_datasets: 4
  training_data_type_split:
    image: 2
    tabular: 2
    text: 1
  test_data_type_split:
    image: 2
    tabular: 1
    text: 1

  # === Training Loop ===
  log_freq: 10                          # Log every 10 iterations
  save_freq: 50                         # Save every 50 iterations
  validate_freq: 50                     # Validate every 50 iterations
  loss_checkpoint_dir: "./learned_losses_polynomial"

  # === Model Training Optimizer ===
  optimizer: "adam"
  lr: 0.0003
  weight_decay: 0.0001

  # === Model Architecture ===
  architecture: "pn_naive"

  # === Polynomial Basis Loss Configuration ===
  num_repetitions: 4                    # 4 repetitions for exploration
  use_prior: true                       # Enable prior conditioning
  init_scale: 0.01                      # Not used for bce_plus_trinary mode
  init_mode: "bce_plus_trinary"         # Rep 0: exact BCE, Reps 1-3: random {-1,0,1}
  init_noise_scale: 0.0                 # Not used for bce_plus_trinary
  oracle_mode: false                    # Use PU labels (-1/1) not binary (0/1)

  # === Dataset Config ===
  batch_size: 64
  val_batch_size: 256

  # === Hardware ===
  device: "auto"

  # === Label Scheme ===
  label_scheme:
    true_positive_label: 1
    true_negative_label: 0
    pu_labeled_label: 1
    pu_unlabeled_label: -1

  # === Random Seed ===
  seed: 42
